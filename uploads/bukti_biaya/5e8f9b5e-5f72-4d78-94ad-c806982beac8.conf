user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}


http {
    include	  /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log    /var/log/nginx/access.log;


    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

    # include /etc/nginx/conf.d/*.conf;

    map $http_upgrade $connection_upgrade {
        default	    "upgrade";
    }

    server {
		listen 80 default_server;
		server_name portaldatadesa.jabarprov.go.id;
		server_tokens off;
		keepalive_timeout 70;

		gzip on;
    	gzip_comp_level 4;
    	gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/x-protobuf;

		proxy_http_version    1.1;
		proxy_set_header   Connection $connection_upgrade;
		proxy_set_header   Upgrade $http_upgrade;
		proxy_set_header   Host $host;
		proxy_set_header   X-Real-IP $remote_addr;
		proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header   X-Forwarded-Host $server_name;

		client_max_body_size 5m;

		# # For SSL
		# location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }

		# For forcing https
		location / {
        return 301 https://$host$request_uri;
    	}
	}

	server {
		listen 			443 ssl;
		server_name 	portaldatadesa.jabarprov.go.id;
		server_tokens 	off;
		keepalive_timeout   70;

        ssl_certificate     /etc/nginx/certs/star_jabarprov_go_id.crt;
        ssl_certificate_key /etc/nginx/certs/commercial.key;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

		# add_header X-Frame-Options "SAMEORIGIN";

		# ssl_certificate     /etc/letsencrypt/live/dashboard.dpmdesa.jabarprov.go.id/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/dashboard.dpmdesa.jabarprov.go.id/privkey.pem;
        # include             /etc/letsencrypt/options-ssl-nginx.conf;
        # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

		gzip on;
    	gzip_comp_level 4;
    	gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/x-protobuf;

		proxy_http_version    1.1;
		proxy_set_header   Connection $connection_upgrade;
		proxy_set_header   Upgrade $http_upgrade;
		proxy_set_header   Host $host;
		proxy_set_header   X-Real-IP $remote_addr;
		proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header   X-Forwarded-Host $server_name;
		
		client_max_body_size 5m;

		# For Minio App
		location ~* ^(\/minio|\/dpmd-storage|\/dpmd-website) {
			if ($request_method = 'OPTIONS') {
				add_header 'Access-Control-Allow-Origin' '*';
				add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
				add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
				add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
				add_header 'Access-Control-Max-Age' 1728000;
				add_header 'Content-Type' 'text/plain; charset=utf-8';
				add_header 'Content-Length' 0;
				return 204;
			}
			add_header 'Access-Control-Allow-Origin' '*' always;
			add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
			add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
			proxy_pass http://dpmd_storage-minio-1:9000;
			proxy_http_version 1.1;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Host $server_name;
		}

		location /minio-console {
			proxy_pass  http://dpmd_storage-minio-1:9001;
    	    proxy_http_version    1.1;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Upgrade $http_upgrade;
			proxy_set_header   Host $host;
			proxy_set_header   X-Real-IP $remote_addr;
			proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header   X-Forwarded-Host $server_name;
    	}
		
		# For Fastapi App
		location /api {
			add_header 'Access-Control-Allow-Origin' '*';
			add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
			add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
			# add_header X-Frame-Options "SAMEORIGIN";

			if ($request_method = 'OPTIONS') {
				return 204;
			}
			# if ($http_referer !~* (portaldatadesa.jabarprov.go.id)) {
			# 	return 403;
			# }
			proxy_pass  http://fastapi:80;
    	    proxy_http_version    1.1;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Upgrade $http_upgrade;
			proxy_set_header   Host $host;
			proxy_set_header   X-Real-IP $remote_addr;
			proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header   X-Forwarded-Host $server_name;
		}

		# Frontend Nuxt 3 - Port 3001
		 location /pemadanan {
		 	proxy_pass http://10.200.55.5:3001;
		 	proxy_http_version 1.1;
		 	proxy_set_header Host $host;
		 	proxy_set_header X-Real-IP $remote_addr;
		 	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		 	proxy_set_header X-Forwarded-Proto $scheme;
		 	proxy_set_header X-Forwarded-Host $server_name;
		 	proxy_set_header Connection $connection_upgrade;
		 	proxy_set_header Upgrade $http_upgrade;
		 }
		
	 	location /pemadanan-api/ {
	 		proxy_pass http://10.200.55.5:8001/;
			rewrite ^/pemadanan-api/(.*)$ /$1 break;	 		
			proxy_set_header Host $host;
	 		proxy_set_header X-Real-IP $remote_addr;
	 		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	 		proxy_set_header X-Forwarded-Proto $scheme;

		}
		# location ~* ^/api/download/ {
		# 	proxy_pass  http://fastapi:80;
    	#     proxy_http_version    1.1;
        #     proxy_set_header   Connection $connection_upgrade;
        #     proxy_set_header   Upgrade $http_upgrade;
		# 	proxy_set_header   Host $host;
		# 	proxy_set_header   X-Real-IP $remote_addr;
		# 	proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
		# 	proxy_set_header   X-Forwarded-Host $server_name;
		# 	add_header X-Frame-Options "";
    	# }

		# For Directus
		location /panel/ {
    	    proxy_pass  http://directus:8055/;
    	    proxy_http_version    1.1;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Upgrade $http_upgrade;
			proxy_set_header   Host $host;
			proxy_set_header   X-Real-IP $remote_addr;
			proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header   X-Forwarded-Host $server_name;
    	}

#		 For Umami
		location /analytics/ {
			proxy_pass http://dpmd_analytics-umami-1:3000/;
    	   proxy_http_version    1.1;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Upgrade $http_upgrade;
			proxy_set_header   Host $host;
			proxy_set_header   X-Real-IP $remote_addr;
			proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header   X-Forwarded-Host $server_name;
		}

		location /analytic/ {
			proxy_pass http://umami:3000;
   	    proxy_http_version    1.1;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Upgrade $http_upgrade;
			proxy_set_header   Host $host;
			proxy_set_header   X-Real-IP $remote_addr;
			proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header   X-Forwarded-Host $server_name;
			proxy_redirect off;
		}
		

		# For React App
		location / {
			root /var/www/html;
			try_files $uri /index.html;
		}
	}
}
